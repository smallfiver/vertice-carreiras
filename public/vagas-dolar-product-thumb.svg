<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="Vagas em Dólar - Vértice Carreiras">
  <!-- Background -->
  <rect width="600" height="600" fill="#0A0E1A"/>

  <!-- Subtle radial glow behind the $ -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="45%">
      <stop offset="0%" stop-color="#C9A961" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#C9A961" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#C9A961" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8CB85"/>
      <stop offset="50%" stop-color="#C9A961"/>
      <stop offset="100%" stop-color="#9A7E3F"/>
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="url(#glow)"/>

  <!-- Dotted grid texture -->
  <g fill="#C9A961" opacity="0.06">
    <circle cx="60" cy="60" r="1.5"/><circle cx="120" cy="60" r="1.5"/><circle cx="180" cy="60" r="1.5"/><circle cx="240" cy="60" r="1.5"/><circle cx="300" cy="60" r="1.5"/><circle cx="360" cy="60" r="1.5"/><circle cx="420" cy="60" r="1.5"/><circle cx="480" cy="60" r="1.5"/><circle cx="540" cy="60" r="1.5"/>
    <circle cx="60" cy="120" r="1.5"/><circle cx="540" cy="120" r="1.5"/>
    <circle cx="60" cy="180" r="1.5"/><circle cx="540" cy="180" r="1.5"/>
    <circle cx="60" cy="240" r="1.5"/><circle cx="540" cy="240" r="1.5"/>
    <circle cx="60" cy="300" r="1.5"/><circle cx="540" cy="300" r="1.5"/>
    <circle cx="60" cy="360" r="1.5"/><circle cx="540" cy="360" r="1.5"/>
    <circle cx="60" cy="420" r="1.5"/><circle cx="540" cy="420" r="1.5"/>
    <circle cx="60" cy="480" r="1.5"/><circle cx="120" cy="480" r="1.5"/><circle cx="180" cy="480" r="1.5"/><circle cx="240" cy="480" r="1.5"/><circle cx="300" cy="480" r="1.5"/><circle cx="360" cy="480" r="1.5"/><circle cx="420" cy="480" r="1.5"/><circle cx="480" cy="480" r="1.5"/><circle cx="540" cy="480" r="1.5"/>
  </g>

  <!-- Corner brackets (premium frame) -->
  <g stroke="#C9A961" stroke-width="3" fill="none" opacity="0.7">
    <path d="M 30 60 L 30 30 L 60 30"/>
    <path d="M 540 30 L 570 30 L 570 60"/>
    <path d="M 30 540 L 30 570 L 60 570"/>
    <path d="M 540 570 L 570 570 L 570 540"/>
  </g>

  <!-- Globe ring around the $ (latitude/longitude) -->
  <g transform="translate(300 260)" stroke="#C9A961" stroke-width="2" fill="none" opacity="0.55">
    <circle cx="0" cy="0" r="155"/>
    <ellipse cx="0" cy="0" rx="155" ry="55"/>
    <ellipse cx="0" cy="0" rx="55" ry="155"/>
    <ellipse cx="0" cy="0" rx="105" ry="155"/>
    <line x1="-155" y1="0" x2="155" y2="0"/>
  </g>

  <!-- Big bold $ symbol -->
  <text x="300" y="335"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="280"
        font-weight="900"
        fill="url(#gold)"
        text-anchor="middle"
        style="paint-order: stroke; stroke: #0A0E1A; stroke-width: 6px;">$</text>

  <!-- Divider line -->
  <line x1="180" y1="420" x2="420" y2="420" stroke="#C9A961" stroke-width="1.5" opacity="0.6"/>

  <!-- Title -->
  <text x="300" y="475"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="54"
        font-weight="800"
        fill="#E8CB85"
        text-anchor="middle"
        letter-spacing="2">VAGAS EM DÓLAR</text>

  <!-- Subtitle -->
  <text x="300" y="515"
        font-family="Helvetica, Arial, sans-serif"
        font-size="16"
        font-weight="600"
        fill="#C9A961"
        text-anchor="middle"
        letter-spacing="8"
        opacity="0.85">VÉRTICE CARREIRAS</text>

  <!-- Small badge bottom -->
  <g transform="translate(300 555)">
    <rect x="-90" y="-15" width="180" height="30" rx="15" fill="#C9A961"/>
    <text x="0" y="5"
          font-family="Helvetica, Arial, sans-serif"
          font-size="13"
          font-weight="700"
          fill="#0A0E1A"
          text-anchor="middle"
          letter-spacing="2">ACESSO INTERNACIONAL</text>
  </g>
</svg>
